name: CI/CD DevSecOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: flask-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Lint YAML + Dockerfile
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint YAML files
        run: |
          pip install yamllint
          yamllint -d relaxed k8s-deployment.yaml
          echo "✅ YAML lint passed"

      - name: Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # ─────────────────────────────────────────
  # JOB 2 : Scan des dépendances
  # ─────────────────────────────────────────
  scan-deps:
    name: 🔐 Scan dépendances
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan requirements.txt
        run: |
          echo "=========================================="
          echo "  TRIVY SCAN - DÉPENDANCES Python"
          echo "=========================================="
          trivy fs --security-checks vuln \
            --severity HIGH,CRITICAL \
            --format table \
            requirements.txt
          echo "Scan terminé (vulnérabilités HIGH/CRITICAL affichées)"

      - name: Scan filesystem (tous niveaux)
        run: |
          trivy fs --security-checks vuln \
            --severity LOW,MEDIUM,HIGH,CRITICAL \
            --format json \
            --output trivy-deps-report.json \
            .

      - name: Upload rapport dépendances
        uses: actions/upload-artifact@v4
        with:
          name: trivy-deps-report
          path: trivy-deps-report.json

  # ─────────────────────────────────────────
  # JOB 3 : Build Docker
  # ─────────────────────────────────────────
  build:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: scan-deps
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ env.IMAGE_NAME }}:latest
          echo "✅ Image construite : ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

      - name: Save Docker image
        run: docker save ${{ env.IMAGE_NAME }}:latest -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  # ─────────────────────────────────────────
  # JOB 4 : Scan image Docker
  # ─────────────────────────────────────────
  scan-image:
    name: 🛡️ Scan image Docker
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan image Docker (table)
        run: |
          echo "=========================================="
          echo "  TRIVY SCAN - IMAGE DOCKER"
          echo "=========================================="
          trivy image --severity HIGH,CRITICAL \
            --format table \
            ${{ env.IMAGE_NAME }}:latest

      - name: Scan image Docker (JSON)
        run: |
          trivy image --severity LOW,MEDIUM,HIGH,CRITICAL \
            --format json \
            --output trivy-image-report.json \
            ${{ env.IMAGE_NAME }}:latest

      - name: Upload rapport image
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json

  # ─────────────────────────────────────────
  # JOB 5 : Conftest - Politique Kubernetes
  # ─────────────────────────────────────────
  conftest:
    name: 📋 Politique Kubernetes (Conftest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.50.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Run Conftest on Kubernetes YAML
        run: |
          echo "=========================================="
          echo "  CONFTEST - POLITIQUE SÉCURITÉ K8S"
          echo "=========================================="
          conftest test k8s-deployment.yaml --policy policy/
          echo "✅ Toutes les politiques respectées"

  # ─────────────────────────────────────────
  # JOB 6 : Résumé de sécurité
  # ─────────────────────────────────────────
  security-summary:
    name: 📊 Résumé sécurité
    runs-on: ubuntu-latest
    needs: [scan-image, conftest]
    if: always()
    steps:
      - name: Résumé pipeline
        run: |
          echo "=========================================="
          echo "  RÉSUMÉ PIPELINE DEVSECOPS"
          echo "=========================================="
          echo "✅ Lint YAML/Dockerfile : OK"
          echo "✅ Scan dépendances Trivy : exécuté"
          echo "✅ Build Docker : OK"
          echo "✅ Scan image Trivy : exécuté"
          echo "✅ Conftest K8s policy : exécuté"
          echo "Pipeline terminé - Voir les artifacts pour les rapports"
